server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        
        # THIS IS THE MAGIC LINE FOR SPAs
        # 1. Check if the exact file exists ($uri)
        # 2. Check if the exact folder exists ($uri/)
        # 3. If neither exists, serve the root index.html
        try_files $uri $uri/ /index.html;
    }
}